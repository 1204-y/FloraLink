name: floralink
version: 1.0.0+1
description: A Flutter app that connects flower enthusiasts with smart care, observation maps, and vibrant communities.
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  http: ^1.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  go_router: ^14.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
